<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>💱 Buzios Converter</title>
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/197/197386.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00c97b;
    --yellow: #f5c842;
    --blue:   #009bde;
    --bg:     #0d1117;
    --card:   #161d27;
    --border: #1f2d3d;
    --text:   #e8edf3;
    --muted:  #5a7080;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px 40px;
  }

  .app {
    width: 100%;
    max-width: 390px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 24px;
  }
  .header .flags {
    font-size: 32px;
    letter-spacing: 4px;
    margin-bottom: 6px;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.5px;
    color: var(--text);
  }
  .header p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Input card */
  .input-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 14px;
    position: relative;
  }

  .input-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .currency-badge {
    background: rgba(0,201,123,0.12);
    color: var(--green);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    padding: 6px 12px;
    border-radius: 8px;
    white-space: nowrap;
    border: 1px solid rgba(0,201,123,0.2);
  }

  input[type="number"] {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 700;
    text-align: right;
    -moz-appearance: textfield;
    width: 100%;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"]::placeholder { color: var(--border); }

  /* Quick buttons */
  .quick-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
  }
  .quick-btns button {
    flex: 1;
    min-width: 55px;
    background: var(--border);
    color: var(--text);
    border: none;
    border-radius: 10px;
    padding: 9px 4px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .quick-btns button:hover  { background: #2a3d50; }
  .quick-btns button:active { transform: scale(0.94); }

  /* Results */
  .results {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
  }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: border-color 0.2s;
  }
  .result-card.highlight-ars { border-color: rgba(0,155,222,0.4); }
  .result-card.highlight-usd { border-color: rgba(245,200,66,0.4);  }

  .result-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .result-flag { font-size: 26px; }
  .result-info {}
  .result-name {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .result-amount {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
  }
  .result-amount.ars { color: var(--blue);   }
  .result-amount.usd { color: var(--yellow); }

  .result-rate {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  /* Config */
  .config-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 12px;
    padding: 10px 18px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    width: 100%;
    margin-bottom: 12px;
    transition: border-color 0.2s, color 0.2s;
  }
  .config-toggle:hover { border-color: var(--green); color: var(--green); }
  .config-toggle .arrow { transition: transform 0.25s; }
  .config-toggle.open .arrow { transform: rotate(180deg); }

  .config-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 14px;
    display: none;
  }
  .config-panel.visible { display: block; }

  .config-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 12px;
  }
  .config-row:last-of-type { margin-bottom: 16px; }

  .config-label {
    font-size: 13px;
    color: var(--muted);
    flex: 1;
  }
  .config-label span { display: block; font-size: 11px; color: #3a5060; }

  .config-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    width: 130px;
    text-align: right;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  .config-input:focus { border-color: var(--green); }
  .config-input::-webkit-inner-spin-button,
  .config-input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .save-btn {
    width: 100%;
    padding: 12px;
    background: var(--green);
    color: #0d1117;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .save-btn:hover  { opacity: 0.88; }
  .save-btn:active { transform: scale(0.97); }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #0d1117;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 10px 22px;
    border-radius: 50px;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
    z-index: 99;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .last-update {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="flags">🇧🇷 ↔ 🇦🇷</div>
    <h1>Buzios Converter</h1>
    <p>Reales → Pesos · Dólares</p>
  </div>

  <!-- Input -->
  <div class="input-card">
    <div class="input-label">¿Cuántos reales?</div>
    <div class="input-row">
      <div class="currency-badge">R$</div>
      <input type="number" id="reales" placeholder="0" inputmode="decimal" oninput="convertir()">
    </div>
    <div class="quick-btns">
      <button onclick="setValor(10)">R$10</button>
      <button onclick="setValor(20)">R$20</button>
      <button onclick="setValor(50)">R$50</button>
      <button onclick="setValor(100)">R$100</button>
      <button onclick="setValor(200)">R$200</button>
      <button onclick="setValor(500)">R$500</button>
    </div>
  </div>

  <!-- Results -->
  <div class="results">
    <div class="result-card highlight-ars">
      <div class="result-left">
        <div class="result-flag">🇦🇷</div>
        <div class="result-info">
          <div class="result-name">Pesos Argentinos</div>
          <div class="result-amount ars" id="ars">$ 0</div>
        </div>
      </div>
      <div class="result-rate" id="rate-ars">1 R$ = ?</div>
    </div>

    <div class="result-card highlight-usd">
      <div class="result-left">
        <div class="result-flag">💵</div>
        <div class="result-info">
          <div class="result-name">Dólares</div>
          <div class="result-amount usd" id="usd">USD 0</div>
        </div>
      </div>
      <div class="result-rate" id="rate-usd">1 R$ = USD ?<br><span id="rate-usd2" style="color:#3a5060">1 USD = ?</span></div>
    </div>
  </div>

  <!-- Config toggle -->
  <button class="config-toggle" id="toggleBtn" onclick="toggleConfig()">
    ⚙ Actualizar cotizaciones <span class="arrow">▾</span>
  </button>

  <div class="config-panel" id="configPanel">
    <div class="config-row">
      <div class="config-label">
        R$ → Peso
        <span>Pesos por cada real</span>
      </div>
      <input class="config-input" id="cotReal" type="number" inputmode="decimal">
    </div>
    <div class="config-row">
      <div class="config-label">
        USD → Peso
        <span>Pesos por cada dólar</span>
      </div>
      <input class="config-input" id="cotDolar" type="number" inputmode="decimal">
    </div>
    <button class="save-btn" onclick="guardar()">Guardar cotizaciones</button>
  </div>

  <div class="last-update" id="lastUpdate"></div>

</div>

<div class="toast" id="toast">✓ Cotizaciones guardadas</div>

<script>
  // Defaults
  const DEFAULT_REAL  = 270;
  const DEFAULT_DOLAR = 1200;

  function getCot(key, def) {
    const v = localStorage.getItem(key);
    return v ? parseFloat(v) : def;
  }

  document.getElementById("cotReal").value  = getCot("real",  DEFAULT_REAL);
  document.getElementById("cotDolar").value = getCot("dolar", DEFAULT_DOLAR);

  const saved = localStorage.getItem("lastUpdate");
  if (saved) document.getElementById("lastUpdate").textContent = "Última actualización: " + saved;

  updateRates();

  function convertir() {
    const reales   = parseFloat(document.getElementById("reales").value) || 0;
    const cotReal  = parseFloat(document.getElementById("cotReal").value)  || DEFAULT_REAL;
    const cotDolar = parseFloat(document.getElementById("cotDolar").value) || DEFAULT_DOLAR;

    const ars = reales * cotReal;
    const usd = ars / cotDolar;

    document.getElementById("ars").textContent = "$ " + ars.toLocaleString("es-AR", {maximumFractionDigits: 0});
    document.getElementById("usd").textContent = "USD " + usd.toFixed(2);
  }

  function updateRates() {
    const cotReal  = parseFloat(document.getElementById("cotReal").value)  || DEFAULT_REAL;
    const cotDolar = parseFloat(document.getElementById("cotDolar").value) || DEFAULT_DOLAR;
    document.getElementById("rate-ars").textContent = "1 R$ = $" + cotReal.toLocaleString("es-AR");
    document.getElementById("rate-usd").childNodes[0].textContent = "1 R$ = USD " + (cotReal / cotDolar).toFixed(4);
    document.getElementById("rate-usd2").textContent = "1 USD = $" + cotDolar.toLocaleString("es-AR");
  }

  function setValor(v) {
    document.getElementById("reales").value = v;
    convertir();
  }

  function toggleConfig() {
    const panel = document.getElementById("configPanel");
    const btn   = document.getElementById("toggleBtn");
    panel.classList.toggle("visible");
    btn.classList.toggle("open");
  }

  function guardar() {
    const real  = document.getElementById("cotReal").value;
    const dolar = document.getElementById("cotDolar").value;
    localStorage.setItem("real",  real);
    localStorage.setItem("dolar", dolar);

    const now = new Date().toLocaleString("es-AR", {day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit"});
    localStorage.setItem("lastUpdate", now);
    document.getElementById("lastUpdate").textContent = "Última actualización: " + now;

    updateRates();
    convertir();
    showToast();
  }

  function showToast() {
    const t = document.getElementById("toast");
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2200);
  }
</script>
</body>
</html>
